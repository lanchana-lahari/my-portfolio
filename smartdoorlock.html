<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>



    <script>
        let password="1234"
        let attempt=0
        function smartdoor()
        {
            
            let user=prompt("Enter your password")
            if (user==password) {
                alert("Door opened successfully!!")
            }
            else if(user!=password && attempt<=1){
                alert("incorrect password")
                attempt++
                smartdoor()
            }
            else{
                alert("System blocked")
            }
        }
        smartdoor()
    </script>
</body>
</html>
