<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./method.css">
    <Style>
        h1::after{
            content: " Shannu";
        }
        h1::before{
            content: " Sheela";
        }
        h1::first-letter{
            background-color: aqua;
        }
        h1::first-line{
            color:blueviolet;
        }
        li::marker{
            content:"▲" 
        }
        li::selection{
            background-color: yellow;
        }
    </Style>
    
</head>
<body>
    <h1> weds</h1>
    <ul>
        <li>yes</li>
        <li>no</li>
    </ul>
</body>
</html>
