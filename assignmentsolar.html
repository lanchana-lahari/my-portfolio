<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
        }
        #galaxy{
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            background-image: url(https://www.grunge.com/img/gallery/how-hard-is-it-for-a-star-to-escape-a-galaxy/intro-1630091529.jpg);
            background-size: cover;
        }
        #sun{
            height: 60px;
            width: 60px;
            border: 1px solid red;

            background-size: cover;
            position: absolute;
            
            
        }
        #orbit1{
            height: 130px;
            width: 130px;
            border: 2px dashed white;
            border-radius: 50%;
            position:absolute;
            animation: rotating 70s linear 0.2s infinite normal;
            
        }
        #mercury{
            height: 60px;
            width: 60px;
            border: 1px solid red;
            border-radius: 50%;
            
            background-image: url(https://www.pngmart.com/files/22/Mercury-PNG-Pic.png);
            background-size: cover;
            position: absolute;
            top: -10px;
            left: 5px;
           
        }
        #orbit2{
            height: 225px;
            width: 225px;
            border: 2px dashed white;
            border-radius: 50%;
            position:absolute;
            animation: rotating 60s linear 0.2s infinite normal;
           
            
        }
        #venus{
            height: 50px;
            width: 50px;
            border: 1px solid red;
            background-image: url(https://www.pngmart.com/files/4/Venus-PNG-Transparent-Image.png);

            position: absolute;
            top: -1px;
            left: 150px;
        }
        
        #orbit3{
            height: 320px;
            width: 320px;
            border: 2px dashed white;
            border-radius: 50%;
            position:absolute;
          animation: rotating 70s linear 0.2s infinite normal;
           
        }

            height: 50px;

            border: 1px solid red;

            position:absolute; 
           animation: rotating 70s linear 0.2s infinite normal;

            width: 50px;

            background-image:url(https://static.vecteezy.com/system/resources/previews/046/485/551/original/mars-planet-on-transparent-background-free-png.png);

            position:absolute;

            position: absolute;
            right: 220px;
            
            
        }
        @keyframes rotating {
            from{
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
