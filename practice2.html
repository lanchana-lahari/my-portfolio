<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        #outline{
            height: 100vh;
            width: 100vw;
            background-color: black;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            
        }
        #instapage{
            height: 85.8vh;
            width: 40vw;
            background-image: linear-gradient(to bottom right ,#6350CE,#C73283 ,#E25156,#FEBA59);
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }
        
        .insta{     
            padding: 20px;
            height: 55vh;
            width: 20vw;
            margin: 20px; 
            background-color: white;
            
        }
        select{
            padding: 2px 2px;
            border: 1px solid whitesmoke;
        }
    </style>
</head>
<body>
    <div id="outline">
    <div id="instapage">
        <div class="insta">
            <div class="select">
                <select name="" id="">
                    <option value="ENGLISH(us)">English(United States)</option>
                </select>
            </div>
            <div class="heading">
                INSTAGRAM

            </div>
            <div>
                <label for="name"> </label>
                <input type="text" id="name">
                <br><br>
                <label for="password"></label>
                <input type="text" id="password">
                <br><br>
                <button>Log In</button>
                <br>
                Forget your login details?<a href="">Get help signinng in.</a>
                <br>
                ------------------OR------------------------
                <br>
                <button>Continue as @yourname</button>
                <br>
            </div>
            <div>
               Don't have an account?<a href="">Sign up.</a>
            </div>
        </div>
    </div>
    </div>
</body>
</html>
