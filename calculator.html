<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./calculator.css">
</head>
<body>
    <div id="calci-holder">
        <div id="calculator">
            <section>
                <input type="text">
            </section>
            <section>
                <div class="boxes" onclick="add()">+</div>
                <div class="boxes" onclick="sub()">-</div>
                <div class="boxes" onclick="multi()">x</div>
                <div class="boxes" onclick="div()">÷</div>
            </section>
            <section>
                <div class="boxes">7</div>
                <div class="boxes">8</div>
                <div class="boxes">9</div>
                <div class="boxes">4</div>
            </section>
            <section>
                <div class="boxes">5</div>
                <div class="boxes">6</div>
                <div class="boxes">1</div>
                <div class="boxes">2</div>
            </section>
            <section>
                <div class="boxes">3</div>
                <div class="boxes">0</div>
                <div class="boxes">.</div>
                <div class="boxes">C</div>
            </section>
            <section>
                <article>=</article>
            </section>
        </div>
    </div>


    <script>
        function add(){
            let a= Number(prompt("Enter a number:"))
            let b= Number(prompt("Enter another number:"))
            alert(`The addition of ${a} +${b} is ${a+b}`)
        }

        function sub(){
            let a= prompt("Enter a number:")
            let b= prompt("Enter another number:")
            alert(`The substraction of ${a}-${b} is ${a-b}`)
        }
        function multi(){
            let a= Number(prompt("Enter a number:"))
            let b= Number(prompt("Enter another number:"))
            alert(`The multiplication of ${a}*${b} is ${a*b}`)
        }
        function div(){
            let a= Number(prompt("Enter a number:"))
            let b= Number(prompt("Enter another number:"))
            alert(`The division  of ${a}/${b} is ${a/b}`)
        }
        
        
    </script>
</body>
</html>
